<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Picnic 2026</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page auth-page--admin">

  <div class="auth-bg"></div>

  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-emblem">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="32" cy="32" r="32" fill="#e8f4f8"/>
          <rect x="18" y="26" width="28" height="22" rx="3" fill="#2d6a4f"/>
          <path d="M24 26 V20 A8 8 0 0 1 40 20 V26" stroke="#2d6a4f" stroke-width="3" stroke-linecap="round" fill="none"/>
          <circle cx="32" cy="37" r="4" fill="#d8f3dc"/>
          <rect x="31" y="37" width="2" height="5" rx="1" fill="#2d6a4f"/>
        </svg>
      </div>

      <h1 class="auth-title">Admin Access</h1>
      <h2 class="auth-subtitle">Picnic 2026 Dashboard</h2>
      <p class="auth-hint">Enter the admin password to continue</p>

      <form id="adminLoginForm" class="auth-form" novalidate>
        <div class="form-field">
          <label for="password" class="sr-only">Admin Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Admin password"
            autocomplete="current-password"
            class="auth-input"
            required
          >
        </div>
        <div id="loginError" class="form-error hidden" role="alert"></div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          Enter Dashboard
        </button>
      </form>

      <p class="auth-back"><a href="/login">← Back to invitation</a></p>
    </div>
  </main>

  <script>
    const form      = document.getElementById('adminLoginForm');
    const errEl     = document.getElementById('loginError');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Checking…';

      try {
        const res  = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = '/admin';
        } else {
          errEl.textContent = data.message || 'Incorrect password.';
          errEl.classList.remove('hidden');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
          submitBtn.disabled = false;
          submitBtn.textContent = 'Enter Dashboard';
        }
      } catch {
        errEl.textContent = 'Connection error — please try again.';
        errEl.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Enter Dashboard';
      }
    });
  </script>
</body>
</html>
