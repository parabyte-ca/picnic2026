<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Picnic 2026</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="admin-page">

  <header class="admin-header">
    <div class="admin-header-inner">
      <div>
        <h1 class="admin-title">Picnic 2026 Admin</h1>
        <p class="admin-subtitle">Moote Friends &amp; Family Picnic — June 20, 2026</p>
      </div>
      <div class="admin-header-actions">
        <button class="btn btn-ghost btn-sm" id="refreshBtn">↻ Refresh</button>
        <button class="btn btn-ghost btn-sm" id="adminLogoutBtn">Sign out</button>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div class="admin-container">

      <!-- ── Summary Stats ──────────────────────────────────────────── -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-value" id="statTotalVotes">—</div>
          <div class="stat-label">Total Photo Votes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTotalRsvps">—</div>
          <div class="stat-label">RSVP Responses</div>
        </div>
        <div class="stat-card stat-card--green">
          <div class="stat-value" id="statParticipating">—</div>
          <div class="stat-label">Playing Cornhole</div>
        </div>
        <div class="stat-card stat-card--gold">
          <div class="stat-value" id="statSets">—</div>
          <div class="stat-label">Sets Available</div>
        </div>
      </div>

      <!-- ── Photo Vote Results ─────────────────────────────────────── -->
      <div class="admin-panel">
        <div class="admin-panel-header">
          <h2>Photo Banner Votes</h2>
          <span class="panel-meta" id="voteTotal">Loading…</span>
        </div>
        <div class="vote-results" id="voteResults">
          <!-- Rendered by admin.js -->
          <div class="loading-msg">Loading vote data…</div>
        </div>
      </div>

      <!-- ── Cornhole RSVPs ──────────────────────────────────────────── -->
      <div class="admin-panel">
        <div class="admin-panel-header">
          <h2>Cornhole RSVP Responses</h2>
          <a href="/api/admin/export" class="btn btn-sm btn-outline" download="cornhole-rsvps.csv">
            ↓ Download CSV
          </a>
        </div>

        <div id="rsvpTableWrap">
          <div class="loading-msg">Loading RSVP data…</div>
        </div>
      </div>

    </div>
  </main>

  <!-- ── Edit RSVP Modal ──────────────────────────────────────────────── -->
  <div id="editModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modalTitle">Edit RSVP</h3>
        <button class="modal-close" id="modalClose" aria-label="Close">&#x2715;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">

        <div class="form-field">
          <label class="form-label" for="editName">Name</label>
          <input type="text" id="editName" class="form-input" placeholder="Full name">
        </div>

        <div class="form-field">
          <label class="form-label">Participating in cornhole?</label>
          <div class="toggle-group">
            <label class="toggle-option">
              <input type="radio" name="editParticipating" value="true"> <span class="toggle-btn">Yes</span>
            </label>
            <label class="toggle-option">
              <input type="radio" name="editParticipating" value="false"> <span class="toggle-btn">No</span>
            </label>
          </div>
        </div>

        <div class="form-field">
          <label class="form-label">Can bring a cornhole set?</label>
          <div class="toggle-group">
            <label class="toggle-option">
              <input type="radio" name="editBringSet" value="true"> <span class="toggle-btn">Yes</span>
            </label>
            <label class="toggle-option">
              <input type="radio" name="editBringSet" value="false"> <span class="toggle-btn">No</span>
            </label>
            <label class="toggle-option">
              <input type="radio" name="editBringSet" value="null"> <span class="toggle-btn">N/A</span>
            </label>
          </div>
        </div>

        <div class="form-field">
          <label class="form-label" for="editEmail">Email</label>
          <input type="email" id="editEmail" class="form-input" placeholder="email@example.com">
        </div>

        <div class="form-field">
          <label class="form-label" for="editDetails">Additional Details</label>
          <textarea id="editDetails" class="form-input form-textarea" rows="3" placeholder="Optional"></textarea>
        </div>

        <div id="editError" class="form-error hidden" role="alert"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="deleteRsvpBtn">Delete Entry</button>
        <div class="modal-footer-right">
          <button class="btn btn-ghost" id="cancelEditBtn">Cancel</button>
          <button class="btn btn-primary" id="saveEditBtn">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
