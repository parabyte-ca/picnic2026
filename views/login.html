<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moote Friends &amp; Family Picnic 2026</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

  <div class="auth-bg"></div>

  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-emblem">
        <span class="auth-leaf" aria-hidden="true">🌿</span>
      </div>

      <h1 class="auth-title">Moote Friends &amp; Family</h1>
      <h2 class="auth-subtitle">Picnic 2026</h2>
      <p class="auth-hint">Enter the password to view your invitation</p>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-field">
          <label for="password" class="sr-only">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            autocomplete="current-password"
            class="auth-input"
            required
          >
        </div>
        <div id="loginError" class="form-error hidden" role="alert"></div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          View Invitation
        </button>
      </form>
    </div>
  </main>

  <script>
    const form    = document.getElementById('loginForm');
    const errEl   = document.getElementById('loginError');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Checking…';

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.message || 'Incorrect password.';
          errEl.classList.remove('hidden');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
          submitBtn.disabled = false;
          submitBtn.textContent = 'View Invitation';
        }
      } catch {
        errEl.textContent = 'Connection error — please try again.';
        errEl.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'View Invitation';
      }
    });
  </script>
</body>
</html>
