<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moote Friends &amp; Family Picnic 2026</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

  <div class="auth-bg"></div>

  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-emblem">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="32" cy="32" r="32" fill="#d8f3dc"/>
          <!-- Canadian maple leaf (11 points) -->
          <path d="M32 7
            L34.5 15.5 L41.5 11 L39 20 L48 18 L43 26.5
            L53.5 28 L45.5 33.5 L49.5 42
            L40 39.5 L37.5 48.5
            L32 43.5
            L26.5 48.5 L24 39.5
            L14.5 42 L18.5 33.5
            L10.5 28 L21 26.5
            L16 18 L25 20
            L22.5 11 L29.5 15.5 Z"
            fill="#2d6a4f"/>
          <!-- Stem -->
          <rect x="29.5" y="43" width="5" height="13" rx="2.5" fill="#2d6a4f"/>
        </svg>
      </div>

      <h1 class="auth-title">Moote Friends &amp; Family</h1>
      <h2 class="auth-subtitle">Picnic 2026</h2>
      <p class="auth-hint">Enter the password to view your invitation</p>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-field">
          <label for="password" class="sr-only">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            autocomplete="current-password"
            class="auth-input"
            required
          >
        </div>
        <div id="loginError" class="form-error hidden" role="alert"></div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          View Invitation
        </button>
      </form>
    </div>
  </main>

  <script>
    const form    = document.getElementById('loginForm');
    const errEl   = document.getElementById('loginError');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Checking…';

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.message || 'Incorrect password.';
          errEl.classList.remove('hidden');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
          submitBtn.disabled = false;
          submitBtn.textContent = 'View Invitation';
        }
      } catch {
        errEl.textContent = 'Connection error — please try again.';
        errEl.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'View Invitation';
      }
    });
  </script>
</body>
</html>
